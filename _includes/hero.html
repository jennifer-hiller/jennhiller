<section id="hero" class="hero section section--hero">
  <div class="container hero__grid">
    <div class="hero__content">
      <div class="hero__copy">
        <h1 class="hero__title">
          {{ site.data.site.hero.headline_prefix }}
          <span>{{ site.data.site.hero.headline_name }}</span>
        </h1>
        <p class="hero__subtitle">{{ site.data.site.hero.subtitle }}</p>
      </div>
      <p class="hero__description">{{ site.data.site.hero.description }}</p>
      <div class="hero__actions">
        <a class="button button--primary" href="#projects">View My Work</a>
        <a class="button button--secondary" href="#contact">Get in Touch</a>
      </div>
      <div class="hero__social" aria-label="Social links">
        <a href="{{ site.data.site.social.github }}" target="_blank" rel="noopener noreferrer"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github size-6 text-gray-700" data-fg-eh6d22="1.15:1.3949:/src/app/components/Hero.tsx:59:17:2341:43:e:Github::::::t8f" data-fgid-eh6d22=":r12:"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path><path d="M9 18c-4.51 2-5-2-7-2"></path></svg></a>
        <a href="{{ site.data.site.social.linkedin }}" target="_blank" rel="noopener noreferrer"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-linkedin size-6 text-gray-700" data-fg-eh6d24="1.15:1.3949:/src/app/components/Hero.tsx:67:17:2664:45:e:Linkedin::::::BytQ" data-fgid-eh6d24=":r14:"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect width="4" height="12" x="2" y="9"></rect><circle cx="4" cy="4" r="2"></circle></svg></a>
      </div>
    </div>
    <div class="hero__media">
      <div class="hero__image-wrap">
        <img
          src="{{ site.data.site.hero.image.url }}"
          alt="{{ site.data.site.hero.image.alt }}"
          class="hero__image"
        >
      </div>
      <div class="hero__glow hero__glow--primary"></div>
      <div class="hero__glow hero__glow--secondary"></div>
    </div>
  </div>
</section>
