<section id="projects" class="section section--surface">
  <div class="container">
    <div class="section-heading">
      <h2>Featured Projects</h2>
      <div class="section-heading__rule"></div>
      <p>
        Here are some of my recent projects showcasing my skills in web
        development and design.
      </p>
    </div>
    <div class="projects-grid">
      {% for project in site.data.projects %}
        <article class="project-card">
          <div class="project-card__media">
            <img src="{{ project.image }}" alt="{{ project.title }}">
          </div>
          <div class="project-card__body">
            <h3>{{ project.title }}</h3>
            <p>{{ project.description }}</p>
            <div class="tag-list tag-list--project">
              {% for tag in project.tags %}
                <span class="tag tag--accent">{{ tag }}</span>
              {% endfor %}
            </div>
            <div class="project-card__actions">
              <a class="button button--secondary" href="{{ project.live_url }}" target="_blank" rel="noopener noreferrer">
                Live Link
              </a>
            </div>
          </div>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
